# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macOS-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'devel'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::remotes
          needs: check

      - name: Install GitHub dependencies
        run: |
          remotes::install_github("catRgory/acsets")
          remotes::install_github("catRgory/catlab")
          remotes::install_github("mrc-ide/odin2")
          remotes::install_github("mrc-ide/dust2")
          remotes::install_github("mrc-ide/monty")
        shell: Rscript {0}

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: '"--no-manual", "--as-cran", "--no-vignettes"'
          build_args: '"--no-build-vignettes"'
